<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header {
            max-width: 900px;
            margin: 0 auto 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.4rem; font-weight: 600; color: #1a1a1a; }
        .subtitle { color: #888; font-size: 0.9rem; margin-top: 2px; }

        .btn-retrain {
            padding: 10px 20px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-retrain:hover { background: #4338ca; }
        .btn-retrain:disabled { background: #a5b4fc; cursor: not-allowed; }

        .retrain-status {
            max-width: 900px;
            margin: 0 auto 20px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }

        .retrain-status.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        .retrain-status.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

        .empty {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
            color: #888;
            padding: 60px 0;
            font-size: 0.95rem;
        }

        .card {
            max-width: 900px;
            margin: 0 auto 16px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1.5px solid #e0e0e0;
        }

        .card.approved { border-color: #bbf7d0; }
        .card.rejected { border-color: #fecaca; opacity: 0.6; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 12px;
        }

        .email-text {
            font-size: 0.9rem;
            color: #333;
            line-height: 1.5;
            flex: 1;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .badges { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .badge.phishing { background: #fef2f2; color: #dc2626; }
        .badge.safe { background: #f0fdf4; color: #16a34a; }
        .badge.correct { background: #eff6ff; color: #2563eb; }
        .badge.incorrect { background: #fff7ed; color: #ea580c; }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #f0f0f0;
        }

        .timestamp { font-size: 0.8rem; color: #aaa; }

        .action-buttons { display: flex; gap: 8px; }

        .btn-approve, .btn-reject {
            padding: 8px 16px;
            border-radius: 7px;
            border: none;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-approve { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        .btn-approve:hover { background: #16a34a; color: white; }
        .btn-reject { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .btn-reject:hover { background: #dc2626; color: white; }
        .btn-approve:disabled, .btn-reject:disabled { opacity: 0.4; cursor: not-allowed; }

        .status-label { font-size: 0.8rem; font-weight: 500; }
        .status-label.approved { color: #16a34a; }
        .status-label.rejected { color: #dc2626; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>Admin Panel</h1>
            <p class="subtitle">Review user feedback and retrain the model</p>
        </div>
        <button class="btn-retrain" onclick="retrain()" id="btnRetrain">🔁 Retrain Model</button>
    </div>

    <div class="retrain-status" id="retrainStatus"></div>

    {% if rows %}
        {% for row in rows %}
        <div class="card" id="card-{{ row[0] }}">
            <div class="card-header">
                <div class="email-text">{{ row[1] }}</div>
                <div class="badges">
                    <span class="badge {{ 'phishing' if row[2] == 'PHISHING' else 'safe' }}">
                        {{ row[2] }}
                    </span>
                    <span class="badge {{ 'correct' if row[3] else 'incorrect' }}">
                        {{ 'Correct' if row[3] else 'Incorrect' }}
                    </span>
                </div>
            </div>
            <div class="card-footer">
                <span class="timestamp">{{ row[4] }}</span>
                <div class="action-buttons" id="actions-{{ row[0] }}">
                    <button class="btn-approve" onclick="decide({{ row[0] }}, 'approve')">✅ Approve</button>
                    <button class="btn-reject" onclick="decide({{ row[0] }}, 'reject')">❌ Reject</button>
                </div>
            </div>
        </div>
        {% endfor %}
    {% else %}
        <div class="empty">No feedback submissions yet.</div>
    {% endif %}

    <script>
        async function decide(id, action) {
            const actionsDiv = document.getElementById(`actions-${id}`);
            const card = document.getElementById(`card-${id}`);

            actionsDiv.innerHTML = `<span class="status-label ${action === 'approve' ? 'approved' : 'rejected'}">
                ${action === 'approve' ? '✅ Approved' : '❌ Rejected'}
            </span>`;

            card.classList.add(action === 'approve' ? 'approved' : 'rejected');

            await fetch('/admin/decide', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, action })
            });
        }

        async function retrain() {
            const btn = document.getElementById('btnRetrain');
            const status = document.getElementById('retrainStatus');

            btn.disabled = true;
            btn.textContent = 'Retraining...';
            status.style.display = 'none';

            const response = await fetch('/admin/retrain', { method: 'POST' });
            const data = await response.json();

            btn.disabled = false;
            btn.textContent = '🔁 Retrain Model';

            status.className = `retrain-status ${data.status === 'ok' ? 'success' : 'error'}`;
            status.textContent = data.message;
            status.style.display = 'block';
        }
    </script>
</body>
</html>
