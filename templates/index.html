<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel | Report Suspicious Email</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f9fafb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .submit-card {
            background: white;
            width: 100%;
            max-width: 550px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        header { margin-bottom: 32px; text-align: center; }
        h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.025em; margin-bottom: 8px; }
        p.desc { color: var(--text-muted); font-size: 0.95rem; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 8px; color: #374151; }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: #fff;
            outline: none;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        textarea { height: 160px; resize: none; line-height: 1.5; }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover { background: var(--primary-hover); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .toast {
            display: none;
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .toast.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    </style>
</head>
<body>

<div class="submit-card">
    <header>
        <h1>Submit for Analysis</h1>
        <p class="desc">Help us train our AI by reporting suspicious emails.</p>
    </header>

    <div class="form-group">
        <label for="subject">Email Subject</label>
        <input type="text" id="subject" placeholder="e.g. Unusual login attempt detected">
    </div>

    <div class="form-group">
        <label for="emailBody">Email Content</label>
        <textarea id="emailBody" placeholder="Paste the full email text here..."></textarea>
    </div>

    <div class="form-group">
        <label for="label">Category</label>
        <select id="label">
            <option value="1">⚠️ Phishing / Suspicious</option>
            <option value="0">✅ Safe / Legitimate</option>
        </select>
    </div>

    <button class="btn-submit" onclick="submitData()" id="submitBtn">Submit Report</button>
    
    <div id="toast" class="toast success">
        Report submitted successfully! Our admins will review it.
    </div>
</div>

<script>
    async function submitData() {
        const subject = document.getElementById('subject').value;
        const body = document.getElementById('emailBody').value;
        const label = document.getElementById('label').value;
        const btn = document.getElementById('submitBtn');
        const toast = document.getElementById('toast');

        if (!body) {
            alert("Please paste the email content.");
            return;
        }

        // Combine subject and body for the model
        const fullText = `Subject: ${subject}\n\n${body}`;

        btn.disabled = true;
        btn.innerText = "Submitting...";

        try {
            const response = await fetch('/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text: fullText,
                    prediction: label === "1" ? "PHISHING" : "SAFE",
                    was_correct: true // Since user is manually labeling it
                })
            });

            if (response.ok) {
                toast.style.display = 'block';
                // Reset form
                document.getElementById('subject').value = '';
                document.getElementById('emailBody').value = '';
            }
        } catch (error) {
            alert("Error connecting to server.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Submit Report";
        }
    }
</script>

</body>
</html>
