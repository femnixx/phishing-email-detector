<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Email Detector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        h1 { font-size: 1.5rem; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
        .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 28px; }

        textarea {
            width: 100%;
            height: 180px;
            padding: 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            color: #1a1a1a;
        }

        textarea:focus { border-color: #4f46e5; }

        .btn-primary {
            margin-top: 14px;
            width: 100%;
            padding: 14px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover { background: #4338ca; }
        .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }

        .result {
            margin-top: 24px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        .result.phishing { background: #fef2f2; border: 1.5px solid #fecaca; }
        .result.safe { background: #f0fdf4; border: 1.5px solid #bbf7d0; }

        .result-label { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
        .result.phishing .result-label { color: #dc2626; }
        .result.safe .result-label { color: #16a34a; }

        .result-prob { font-size: 0.9rem; color: #555; margin-bottom: 16px; }

        .feedback-section { border-top: 1px solid #e0e0e0; padding-top: 14px; }
        .feedback-label { font-size: 0.85rem; color: #888; margin-bottom: 10px; }

        .feedback-buttons { display: flex; gap: 10px; }

        .btn-feedback {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1.5px solid #e0e0e0;
            background: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn-feedback:hover { border-color: #4f46e5; color: #4f46e5; }
        .btn-feedback.selected { background: #4f46e5; color: white; border-color: #4f46e5; }
        .btn-feedback:disabled { opacity: 0.5; cursor: not-allowed; }

        .feedback-thanks {
            font-size: 0.85rem;
            color: #16a34a;
            margin-top: 10px;
            display: none;
        }

        .loading { text-align: center; color: #888; font-size: 0.9rem; margin-top: 16px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Phishing Email Detector</h1>
        <p class="subtitle">Paste an email below to check if it's safe or a phishing attempt.</p>

        <textarea id="emailText" placeholder="Paste your email here..."></textarea>
        <button class="btn-primary" onclick="checkEmail()" id="btn">Check Email</button>
        <p class="loading" id="loading">Analyzing...</p>

        <div class="result" id="result">
            <div class="result-label" id="resultLabel"></div>
            <div class="result-prob" id="resultProb"></div>

            <div class="feedback-section">
                <p class="feedback-label">Was this prediction correct?</p>
                <div class="feedback-buttons">
                    <button class="btn-feedback" onclick="submitFeedback(true)" id="btnYes">✅ Yes, correct</button>
                    <button class="btn-feedback" onclick="submitFeedback(false)" id="btnNo">❌ No, incorrect</button>
                </div>
                <p class="feedback-thanks" id="feedbackThanks">Thanks for the feedback!</p>
            </div>
        </div>
    </div>

    <script>
        let lastEmailText = '';
        let lastPrediction = '';

        async function checkEmail() {
            const text = document.getElementById('emailText').value.trim();
            if (!text) return;

            lastEmailText = text;

            const btn = document.getElementById('btn');
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');

            btn.disabled = true;
            loading.style.display = 'block';
            resultDiv.style.display = 'none';
            document.getElementById('feedbackThanks').style.display = 'none';
            document.getElementById('btnYes').classList.remove('selected');
            document.getElementById('btnNo').classList.remove('selected');

            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });

            const data = await response.json();
            lastPrediction = data.result;

            btn.disabled = false;
            loading.style.display = 'none';

            resultDiv.className = `result ${data.result === 'PHISHING' ? 'phishing' : 'safe'}`;
            resultDiv.style.display = 'block';

            document.getElementById('resultLabel').textContent =
                data.result === 'PHISHING' ? '⚠️ Phishing Detected' : '✅ Looks Safe';
            document.getElementById('resultProb').textContent =
                `Phishing probability: ${data.probability}%`;
        }

        async function submitFeedback(wasCorrect) {
            document.getElementById('btnYes').disabled = true;
            document.getElementById('btnNo').disabled = true;
            document.getElementById(wasCorrect ? 'btnYes' : 'btnNo').classList.add('selected');

            await fetch('/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text: lastEmailText,
                    prediction: lastPrediction,
                    was_correct: wasCorrect
                })
            });

            document.getElementById('feedbackThanks').style.display = 'block';
        }
    </script>
</body>
</html>
